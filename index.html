<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Collaborative Storybook</title>
    <!-- Include Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #fcfbf7;
            --text-color: #2c2520;
            --accent-color: #8b5a2b;
            --border-color: #e6dfd3;
        }

        body {
            font-family: 'Georgia', serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.8;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            border-bottom: 2px double var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 40px;
            position: relative;
        }

        h1 {
            font-weight: normal;
            font-size: 2.5rem;
            margin: 0;
        }

        .admin-btn {
            position: absolute;
            top: 0;
            right: 0;
            background: none;
            border: 1px solid var(--border-color);
            padding: 5px 10px;
            font-family: sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 4px;
            color: #777;
        }

        .admin-btn:hover {
            background-color: #f0ede6;
        }

        .admin-badge {
            background-color: #d9534f;
            color: white;
            padding: 2px 8px;
            border-radius: 3px;
            font-family: sans-serif;
            font-size: 0.8rem;
            margin-left: 10px;
            display: none;
        }

        #book-feed {
            margin-bottom: 60px;
            min-height: 200px;
        }

        .book-paragraph {
            margin-bottom: 24px;
            text-align: justify;
            position: relative;
            padding-right: 80px;
        }

        .author-name {
            font-family: sans-serif;
            font-size: 0.8rem;
            color: var(--accent-color);
            display: block;
            margin-top: 4px;
            font-style: italic;
        }

        .delete-btn {
            display: none;
            position: absolute;
            right: 0;
            top: 0;
            background-color: #d9534f;
            color: white;
            border: none;
            padding: 3px 8px;
            font-family: sans-serif;
            font-size: 0.75rem;
            cursor: pointer;
            border-radius: 3px;
        }

        .delete-btn:hover {
            background-color: #c9302c;
        }

        form {
            background-color: #f5f1e8;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        h3 {
            margin-top: 0;
            font-family: sans-serif;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-family: sans-serif;
            font-size: 0.9rem;
            font-weight: bold;
        }

        input[type="text"], input[type="email"], textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-family: sans-serif;
            box-sizing: border-box;
            background-color: #fff;
        }

        textarea {
            font-family: 'Georgia', serif;
            resize: vertical;
            height: 100px;
        }

        button[type="submit"] {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 4px;
            font-family: sans-serif;
            width: 100%;
        }

        button[type="submit"]:hover {
            background-color: #6e4620;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>The Shared Chronicles</h1>
            <span id="admin-indicator" class="admin-badge">Admin Mode</span>
            <button id="login-trigger" class="admin-btn" onclick="handleAdminLogin()">Admin Login</button>
        </header>

        <!-- The Book Content -->
        <div id="book-feed">Loading the book chapters...</div>

        <!-- Submission Form -->
        <form id="contribution-form">
            <h3>Add Your Chapter</h3>
            <div class="form-group">
                <label for="user-name">Your Name</label>
                <input type="text" id="user-name" required placeholder="Jane Doe">
            </div>
            <div class="form-group">
                <label for="user-email">Your Email (Kept Private)</label>
                <input type="email" id="user-email" required placeholder="jane@example.com">
            </div>
            <div class="form-group">
                <label for="user-content">Write your lines...</label>
                <textarea id="user-content" required placeholder="Continue the story here..."></textarea>
            </div>
            <button type="submit">Publish to Book</button>
        </form>
    </div>

    <script>
        // 1. CONFIGURATION WITH YOUR COPIED KEYS
        const SUPABASE_URL = "https://xsixrrsqontpuvztdfvl.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_AWcPWAQUHTsifBfjtD6e6w_b9D_yFFn";

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let isAdmin = false;

        // 2. FETCH AND DISPLAY ENTRIES
        async function fetchBookLines() {
            const feed = document.getElementById('book-feed');
            
            let { data: lines, error } = await supabase
                .from('book_lines')
                .select('id, name, content')
                .order('created_at', { ascending: true });

            if (error) {
                feed.innerHTML = "<p>Error loading the book. Check your Supabase configuration.</p>";
                console.error(error);
                return;
            }

            if (lines.length === 0) {
                feed.innerHTML = "<p style='text-align:center; color:#888;'>The book is currently empty. Be the first to add a line!</p>";
                return;
            }

            feed.innerHTML = '';
            lines.forEach(line => {
                const p = document.createElement('p');
                p.className = 'book-paragraph';
                
                // Escape simple HTML text to prevent XSS injection
                const textContent = document.createTextNode(line.content);
                p.appendChild(textContent);

                const authorSpan = document.createElement('span');
                authorSpan.className = 'author-name';
                authorSpan.innerText = `— ${line.name}`;
                p.appendChild(authorSpan);

                // Add delete button hidden by default (visible only if isAdmin is true)
                const delBtn = document.createElement('button');
                delBtn.className = 'delete-btn';
                delBtn.innerText = 'Delete';
                delBtn.style.display = isAdmin ? 'block' : 'none';
                delBtn.onclick = () => deleteLine(line.id);
                p.appendChild(delBtn);

                feed.appendChild(p);
            });
        }

        // 3. HANDLE NEW SUBMISSIONS
        document.getElementById('contribution-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('user-name').value;
            const email = document.getElementById('user-email').value;
            const content = document.getElementById('user-content').value;

            const { error } = await supabase
                .from('book_lines')
                .insert([{ name, email, content }]);

            if (error) {
                alert('Could not submit your line: ' + error.message);
            } else {
                // Clear the content textarea and reload the book
                document.getElementById('user-content').value = '';
                fetchBookLines();
            }
        });

        // 4. ADMIN LOGIN UTILITY
        function handleAdminLogin() {
            if (isAdmin) {
                // Logout logic
                isAdmin = false;
                document.getElementById('admin-indicator').style.display = 'none';
                document.getElementById('login-trigger').innerText = 'Admin Login';
                fetchBookLines();
                return;
            }

            const username = prompt("Enter Admin Username:");
            const password = prompt("Enter Admin Password:");

            if (username === "admin" && password === "admin123") {
                isAdmin = true;
                document.getElementById('admin-indicator').style.display = 'inline-block';
                document.getElementById('login-trigger').innerText = 'Admin Logout';
                fetchBookLines(); // Refresh to show delete buttons
            } else {
                alert("Invalid admin credentials!");
            }
        }

        // 5. ADMIN ACTION: DELETE ENTRY
        async function deleteLine(id) {
            if (!isAdmin) return;
            
            if (confirm("Are you sure you want to delete this line from the book?")) {
                const { error } = await supabase
                    .from('book_lines')
                    .delete()
                    .eq('id', id);

                if (error) {
                    alert('Error deleting line: ' + error.message);
                } else {
                    fetchBookLines();
                }
            }
        }

        // Load the book automatically on page load
        window.onload = fetchBookLines;
    </script>
</body>
</html>
