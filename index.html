<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Codex of Humanity</title>
    <!-- Include Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --border-color: #e2e8f0;
            --danger: #ef4444;
            --danger-hover: #dc2626;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 48px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .title-area h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin: 0;
        }

        .title-area p {
            margin: 4px 0 0 0;
            font-size: 0.95rem;
            color: var(--text-muted);
            font-style: italic;
        }

        .auth-buttons-container {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 6px;
            color: var(--text-muted);
            transition: all 0.2s ease;
        }

        .btn-secondary:hover {
            background-color: #f1f5f9;
            color: var(--text-main);
        }

        .status-badge {
            background-color: #dcfce7;
            color: #15803d;
            padding: 4px 10px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            display: none;
        }

        #book-feed {
            margin-bottom: 48px;
        }

        .book-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
            position: relative;
            transition: box-shadow 0.2s ease;
        }

        .book-card:hover {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        .book-content {
            font-size: 1.05rem;
            color: var(--text-main);
            margin: 0 0 12px 0;
            white-space: pre-wrap;
        }

        .book-meta {
            display: flex;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .delete-btn {
            display: none;
            position: absolute;
            right: 24px;
            bottom: 24px;
            background-color: #fee2e2;
            color: var(--danger);
            border: none;
            padding: 6px 12px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .delete-btn:hover {
            background-color: var(--danger);
            color: white;
        }

        .form-card {
            background-color: var(--card-bg);
            padding: 32px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .form-card h3 {
            margin: 0 0 24px 0;
            font-size: 1.25rem;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-main);
        }

        input[type="text"], input[type="email"], input[type="password"], textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95rem;
            box-sizing: border-box;
            background-color: #fff;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 110px;
            font-family: inherit;
        }

        button[type="submit"] {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            width: 100%;
            transition: background-color 0.2s ease;
        }

        button[type="submit"]:hover {
            background-color: var(--primary-hover);
        }

        /* MODERN DIALOG MODAL SYSTEM */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-container {
            background-color: var(--card-bg);
            padding: 32px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            transform: scale(0.95);
            transition: transform 0.2s ease;
            box-sizing: border-box;
        }

        .modal-overlay.active .modal-container {
            transform: scale(1);
        }

        .modal-header h3 {
            margin: 0 0 8px 0;
            font-size: 1.25rem;
            font-weight: 700;
        }

        .modal-header p {
            margin: 0 0 20px 0;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }

        .divider:not(:empty)::before {
            margin-right: .5em;
        }

        .divider:not(:empty)::after {
            margin-left: .5em;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background-color: #ffffff;
            border: 1px solid var(--border-color);
            padding: 10px 16px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-main);
            transition: background-color 0.2s ease;
        }

        .google-btn:hover {
            background-color: #f8fafc;
        }

        .google-icon {
            width: 18px;
            height: 18px;
        }

        .modal-footer-toggle {
            text-align: center;
            margin-top: 20px;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .modal-footer-toggle span {
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
        }

        .modal-footer-toggle span:hover {
            text-decoration: underline;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="title-area">
                <h1>The Codex of Humanity</h1>
                <p>A Billion Whispers of Wisdom</p>
            </div>
            <div class="auth-buttons-container">
                <span id="authenticated-badge" class="status-badge">Session Active</span>
                <button id="auth-trigger-btn" class="btn-secondary" onclick="openAuthModal()">Sign In</button>
            </div>
        </header>

        <!-- The Book Feed -->
        <div id="book-feed">Loading workspace items...</div>

        <!-- Submission Form -->
        <div class="form-card">
            <h3>Add Your Chapter</h3>
            <form id="contribution-form">
                <div class="form-group">
                    <label for="user-name">Your Name</label>
                    <input type="text" id="user-name" required placeholder="Jane Doe">
                </div>
                <div class="form-group">
                    <label for="user-email">Your Email (Kept Private)</label>
                    <input type="email" id="user-email" required placeholder="jane@example.com">
                </div>
                <div class="form-group">
                    <label for="user-content">Write your lines...</label>
                    <textarea id="user-content" required placeholder="Continue the story here..."></textarea>
                </div>
                <button type="submit">Publish to Book</button>
            </form>
        </div>
    </div>

    <!-- MODERN AUTH MODAL WITH GOOGLE BUTTON -->
    <div id="auth-modal" class="modal-overlay" onclick="closeAuthModalViaOverlay(event)">
        <div class="modal-container">
            <div class="modal-header">
                <h3 id="modal-title">Sign In</h3>
                <p id="modal-desc">Access secure parameters to manage log entries.</p>
            </div>
            <form id="modal-auth-form" onsubmit="handleAuthSubmit(event)">
                <div class="form-group">
                    <label id="username-label" for="modal-username">Username or Email</label>
                    <input type="text" id="modal-username" required placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label for="modal-password">Password</label>
                    <input type="password" id="modal-password" required placeholder="••••••••">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeAuthModal()">Cancel</button>
                    <button type="submit" id="modal-submit-btn" style="background-color:var(--primary); color:white; border:none; padding:8px 16px; font-weight:600; border-radius:6px; cursor:pointer;">Continue</button>
                </div>
            </form>

            <div class="divider">or</div>

            <!-- Sleek SVG Google Button -->
            <button class="google-btn" onclick="signInWithGoogle()">
                <svg class="google-icon" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.85z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.85c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Sign In with Google
            </button>

            <div class="modal-footer-toggle" id="modal-toggle-wrapper">
                Don't have an account? <span onclick="toggleAuthMode('signup')">Sign Up</span>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://xsixrrsqontpuvztdfvl.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_AWcPWAQUHTsifBfjtD6e6w_b9D_yFFn";

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let sessionActive = false;
        let currentAuthMode = 'signin'; 

        // 1. MONITOR AUTHENTICATION CHANGES AUTOMATICALLY
        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (session) {
                sessionActive = true;
                document.getElementById('authenticated-badge').style.display = 'inline-block';
                document.getElementById('auth-trigger-btn').innerText = 'Sign Out';
            } else {
                sessionActive = false;
                document.getElementById('authenticated-badge').style.display = 'none';
                document.getElementById('auth-trigger-btn').innerText = 'Sign In';
            }
            fetchBookLines();
        });

        // 2. TRIGGER GOOGLE POPUP LOGIN HANDSHAKE
        async function signInWithGoogle() {
            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.origin + window.location.pathname
                }
            });
            if (error) alert("Google Sign-In Error: " + error.message);
        }

        // 3. RETRIEVE AND RENDER LOG LINES
        async function fetchBookLines() {
            const feed = document.getElementById('book-feed');
            
            let { data: lines, error } = await supabaseClient
                .from('book_lines')
                .select('id, name, content')
                .order('created_at', { ascending: true });

            if (error) {
                feed.innerHTML = "<div class='book-card'><p>Error establishing database communication loop.</p></div>";
                console.error(error);
                return;
            }

            if (!lines || lines.length === 0) {
                feed.innerHTML = "<div class='book-card' style='text-align:center; color:var(--text-muted);'>The book is currently empty. Be the first to add a line!</div>";
                return;
            }

            feed.innerHTML = '';
            lines.forEach(line => {
                const card = document.createElement('div');
                card.className = 'book-card';
                
                const contentDiv = document.createElement('p');
                contentDiv.className = 'book-content';
                contentDiv.appendChild(document.createTextNode(line.content));
                card.appendChild(contentDiv);

                const metaDiv = document.createElement('div');
                metaDiv.className = 'book-meta';
                metaDiv.innerText = `By ${line.name}`;
                card.appendChild(metaDiv);

                const delBtn = document.createElement('button');
                delBtn.className = 'delete-btn';
                delBtn.innerText = 'Delete';
                delBtn.style.display = sessionActive ? 'block' : 'none';
                delBtn.onclick = () => deleteLine(line.id);
                card.appendChild(delBtn);

                feed.appendChild(card);
            });
        }

        // 4. PERSIST NEW CONTENT LOG
        document.getElementById('contribution-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('user-name').value;
            const email = document.getElementById('user-email').value;
            const content = document.getElementById('user-content').value;

            const { error } = await supabaseClient
                .from('book_lines')
                .insert([{ name, email, content }]);

            if (error) {
                alert('Submission pipeline validation failed: ' + error.message);
            } else {
                document.getElementById('user-content').value = '';
                fetchBookLines();
            }
        });

        // 5. CLIENT INTERFACE MODAL CONTROLS
        async function openAuthModal() {
            if (sessionActive) {
                await supabaseClient.auth.signOut();
                return;
            }
            toggleAuthMode('signin'); 
            document.getElementById('auth-modal').classList.add('active');
        }

        function closeAuthModal() {
            document.getElementById('auth-modal').classList.remove('active');
            document.getElementById('modal-auth-form').reset();
        }

        function closeAuthModalViaOverlay(e) {
            if (e.target.id === 'auth-modal') {
                closeAuthModal();
            }
        }

        function toggleAuthMode(mode) {
            currentAuthMode = mode;
            const title = document.getElementById('modal-title');
            const desc = document.getElementById('modal-desc');
            const label = document.getElementById('username-label');
            const toggleWrapper = document.getElementById('modal-toggle-wrapper');
            const submitBtn = document.getElementById('modal-submit-btn');

            if (mode === 'signup') {
                title.innerText = "Create Account";
                desc.innerText = "Register your credentials to claim access.";
                label.innerText = "Choose a Username";
                submitBtn.innerText = "Register";
                toggleWrapper.innerHTML = 'Already have an account? <span onclick="toggleAuthMode(\'signin\')">Sign In</span>';
            } else {
                title.innerText = "Sign In";
                desc.innerText = "Access secure parameters to manage log entries.";
                label.innerText = "Username or Email";
                submitBtn.innerText = "Continue";
                toggleWrapper.innerHTML = 'Don\'t have an account? <span onclick="toggleAuthMode(\'signup\')">Sign Up</span>';
            }
        }

        // 6. BACKUP CLASSIC VERIFICATION PRIVILEGES
        function handleAuthSubmit(e) {
            e.preventDefault();
            const u = document.getElementById('modal-username').value;
            const p = document.getElementById('modal-password').value;

            if (currentAuthMode === 'signup') {
                alert(`Account registration request received for "${u}". Try using the Google Sign-In button for an instant automated profile creation!`);
                toggleAuthMode('signin');
                return;
            }

            if (u === "admin" && p === "admin123") {
                sessionActive = true;
                document.getElementById('authenticated-badge').style.display = 'inline-block';
                document.getElementById('auth-trigger-btn').innerText = 'Sign Out';
                closeAuthModal();
                fetchBookLines(); 
            } else {
                alert("Authentication credentials rejected.");
            }
        }

        // 7. PURGE LOG LINE DIRECTIVE
        async function deleteLine(id) {
            if (!sessionActive) return;
            
            if (confirm("Confirm removal of this record step from the database?")) {
                const { error } = await supabaseClient
                    .from('book_lines')
                    .delete()
                    .eq('id', id);

                if (error) {
                    alert('Purge operation fault: ' + error.message);
                } else {
                    fetchBookLines();
                }
            }
        }

        window.onload = fetchBookLines;
    </script>
</body>
</html>
